<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Live Clock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.7), 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .container {
            background: rgba(10, 15, 20, 0.7);
            border: 2px solid #00f2ff;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2), 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            text-align: center;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px solid #ff0055;
            border-radius: 15px;
            opacity: 0.5;
            pointer-events: none;
        }

        .label {
            font-size: 10px;
            letter-spacing: 3px;
            color: #ff0055;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #time {
            font-size: 64px;
            font-weight: 700;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: rgba(0, 242, 255, 0.8);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 242, 255, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
            font-size: 8px;
            color: #ff0055;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scanline"></div>
        <div class="label">System Chronometer</div>
        <div id="time">00:00:00</div>
        <div id="date">LOADING...</div>
        <div class="status-bar">
            <span>CORE: ONLINE</span>
            <span>SECURE: YES</span>
            <span>WIDGET-CORE: V1.0</span>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${h}:${m}:${s}`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options).toUpperCase();
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
